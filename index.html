<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>115年 5/24~7/31 行事曆與旅遊安排建議</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Microsoft JhengHei",sans-serif;
  background:#f4f7fb;
  color:#222;
}

.wrapper{
  max-width:1500px;
  margin:auto;
  padding:20px;
}

.title{
  text-align:center;
  font-size:52px;
  font-weight:900;
  color:#123ea8;
  margin-bottom:8px;
}

.subtitle{
  text-align:center;
  font-size:26px;
  font-weight:700;
  margin-bottom:20px;
}

.layout{
  display:grid;
  grid-template-columns:1fr 360px;
  gap:20px;
}

/* ===== Calendar ===== */
.calendar-section{
  background:#fff;
  border-radius:24px;
  padding:20px;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
}

.month-title{
  font-size:40px;
  font-weight:900;
  color:#fff;
  background:#2450c7;
  padding:10px 24px;
  border-radius:18px;
  display:inline-block;
  margin:30px 0 14px;

  position: sticky;
  top: 0;
  z-index: 50;
}

.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  border:2px solid #cfd8ea;
  overflow:hidden;
  border-radius:18px;
}

.day-header{
  background:#2d53c9;
  color:#fff;
  text-align:center;
  padding:12px 0;
  font-size:26px;
  font-weight:900;
}

.cell{
  min-height:120px;
  border-right:1px solid #d9dfeb;
  border-top:1px solid #d9dfeb;
  padding:8px;
  background:#fff;
  position:relative;

  scroll-snap-align:start;
}

.cell:nth-child(7n){border-right:none}

.date{
  font-size:34px;
  font-weight:900;
}

.week{
  font-size:18px;
  font-weight:700;
}

.sun .date,.sun .week{color:#d81b1b}
.sat .date,.sat .week{color:#1844c9}

.other-month{
  background:#f3f4f8;
  color:#aaa;
}

/* event */
.event{
  margin-top:6px;
  border-radius:12px;
  padding:5px 8px;
  font-size:18px;
  font-weight:800;
  line-height:1.35;
  color:#fff;
}

.orange{background:#ff7b00}
.green{background:#23a33b}
.blue{background:#2563eb}
.purple{background:#8b5cf6}
.yellow{background:#eab308;color:#222}
.pink{background:#ec4899}
.teal{background:#14b8a6}
.red{background:#ef4444}

/* ===== Sidebar ===== */
.sidebar{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.panel{
  background:#fff;
  border-radius:24px;
  padding:20px;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
}

.panel h3{
  margin-top:0;
  font-size:34px;
  color:#163ca8;
}

.legend-item{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
  font-size:22px;
  font-weight:700;
}

.dot{
  width:20px;
  height:20px;
  border-radius:6px;
}

.travel-box{
  margin-top:30px;
  background:#fff;
  border-radius:24px;
  padding:20px;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
}

.travel-title{
  font-size:38px;
  color:#1c8a2e;
  font-weight:900;
  margin-bottom:18px;
}

.travel-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.travel-item{
  border:3px solid #b9e5be;
  border-radius:20px;
  padding:18px;
  background:#f8fff9;
}

.travel-item h4{
  margin:0 0 10px;
  font-size:30px;
  color:#1f7f31;
}

.travel-item p{
  margin:0;
  font-size:22px;
}

/* ===== Mobile ===== */
@media(max-width:768px){

  .layout{
    grid-template-columns:1fr;
  }

  .calendar-section{
    padding:14px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }

  .calendar-grid{
    min-width:720px;
    scroll-snap-type:x mandatory;
  }

  .month-title{
    font-size:28px;
    width:100%;
    text-align:center;
    margin:20px 0 10px;
  }

  .title{font-size:32px}
  .subtitle{font-size:18px}

  .day-header{font-size:18px}
  .date{font-size:24px}

  .cell{
    min-height:100px;
  }

  .event{
    font-size:12px;
  }

  .travel-grid{
    grid-template-columns:1fr;
  }

  .panel h3{
    font-size:24px;
  }
}

@media(max-width:480px){
  .calendar-grid{min-width:640px}
  .cell{min-height:90px}
  .date{font-size:20px}
}
</style>
</head>

<body>
<div class="wrapper">

  <div class="title">5/24～7/31 行事曆 ＆ 旅遊安排建議</div>
  <div class="subtitle">115年（台灣時間）</div>

  <div class="layout">

    <div class="calendar-section">
      <div id="calendar"></div>

      <div class="travel-box">
        <div class="travel-title">可安排旅遊建議時段</div>

        <div class="travel-grid">
          <div class="travel-item">
            <h4>① 5/24～5/26</h4>
            <p>五月底空檔</p>
          </div>

          <div class="travel-item">
            <h4>② 6/27～6/29</h4>
            <p>避免晉級與林運盃</p>
          </div>

          <div class="travel-item">
            <h4>③ 7/18～7/20</h4>
            <p>暑期較輕鬆</p>
          </div>
        </div>
      </div>
    </div>

    <div class="sidebar">

      <div class="panel">
        <h3>行事曆圖例</h3>
        <div class="legend-item"><div class="dot blue"></div> 期末考</div>
        <div class="legend-item"><div class="dot green"></div> 安和</div>
        <div class="legend-item"><div class="dot orange"></div> 樂利</div>
        <div class="legend-item"><div class="dot purple"></div> 集訓</div>
        <div class="legend-item"><div class="dot yellow"></div> 全少賽</div>
        <div class="legend-item"><div class="dot pink"></div> 議長盃</div>
        <div class="legend-item"><div class="dot teal"></div> 夏令營</div>
        <div class="legend-item"><div class="dot red"></div> 泰國營</div>
      </div>

    </div>
  </div>
</div>

<script>
const events = {
  '2026-05-30': [{text:'集訓', cls:'purple'}],
  '2026-06-09': [{text:'全少賽', cls:'yellow'}],
  '2026-06-17': [{text:'期末考', cls:'green'}],
  '2026-06-27': [{text:'晉級', cls:'purple'}],
  '2026-06-28': [{text:'林運盃', cls:'red'}],
  '2026-07-03': [{text:'品勢', cls:'blue'}],
  '2026-07-10': [{text:'議長盃', cls:'pink'}],
};

const months=[
  {year:2026,month:4,label:'115年 5月'},
  {year:2026,month:5,label:'115年 6月'},
  {year:2026,month:6,label:'115年 7月'}
];

const week=['日','一','二','三','四','五','六'];
const calendar=document.getElementById('calendar');

months.forEach(m=>{
  const wrap=document.createElement('div');

  const title=document.createElement('div');
  title.className='month-title';
  title.textContent=m.label;
  wrap.appendChild(title);

  const grid=document.createElement('div');
  grid.className='calendar-grid';

  week.forEach(w=>{
    const h=document.createElement('div');
    h.className='day-header';
    h.textContent=w;
    grid.appendChild(h);
  });

  const start=new Date(m.year,m.month,1);
  const end=new Date(m.year,m.month+1,0);

  const s=new Date(start);
  s.setDate(1-start.getDay());

  const e=new Date(end);
  e.setDate(end.getDate()+(6-end.getDay()));

  for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){

    const cell=document.createElement('div');
    cell.className='cell';

    if(d.getDay()==0) cell.classList.add('sun');
    if(d.getDay()==6) cell.classList.add('sat');

    if(d.getMonth()!=m.month) cell.classList.add('other-month');

    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

    cell.innerHTML=`
      <div class="date">${d.getDate()}</div>
      <div class="week">星期${week[d.getDay()]}</div>
    `;

    if(events[key]){
      events[key].forEach(ev=>{
        const div=document.createElement('div');
        div.className='event '+ev.cls;
        div.textContent=ev.text;
        cell.appendChild(div);
      });
    }

    grid.appendChild(cell);
  }

  wrap.appendChild(grid);
  calendar.appendChild(wrap);
});
</script>

</body>
</html>
